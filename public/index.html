<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <title>Password Input</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #ffd1dc, #d1c4e9);
      }
      .hint-card {
        position: absolute;
        width: 300px;
        transition: transform 0.5s ease-in-out;
        display: none;
      }
      .hint-card.show {
        display: block;
      }
      .hint-card.left {
        transform: translateX(-100%);
      }
      .hint-card.right {
        transform: translateX(100%);
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id=""></div>
    <form onsubmit="return validatePassword()">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" class="form-control mb-2">
        <input type="submit" value="Submit" class="btn btn-primary">
    </form>

    <div id="hint1" class="card hint-card left" style="top: 20px;">
        <div class="card-body">
            Hint 1: The password is 10 characters long.
        </div>
    </div>
    <div id="hint2" class="card hint-card right" style="top: 100px;">
        <div class="card-body">
            Hint 2: It starts with 'b'.
        </div>
    </div>
    <div id="hint3" class="card hint-card left" style="top: 180px;">
        <div class="card-body">
            Hint 3: It ends with 'c'.
        </div>
    </div>
    <div id="hint4" class="card hint-card right" style="top: 260px;">
        <div class="card-body">
            Hint 4: It contains the word 'tastic'.
        </div>
    </div>
    <div id="hint5" class="card hint-card left" style="top: 340px;">
        <div class="card-body">
            Hint 5: It has no numbers.
        </div>
    </div>

    <script>
        let hintIndex = 0;
        const hints = ['hint1', 'hint2', 'hint3', 'hint4', 'hint5'];

        function validatePassword() {
            var password = document.getElementById('password').value;
            if (password === 'bebitastic') {
                return true;
            } else {
                showHint();
                return false;
            }
        }

        function showHint() {
            if (hintIndex < hints.length) {
                const hint = document.getElementById(hints[hintIndex]);
                hint.classList.add('show');
                hintIndex++;
            } else {
                alert('Incorrect password');
            }
        }
    </script>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  </body>
</html>
